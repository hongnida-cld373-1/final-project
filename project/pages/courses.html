<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AUPP LMS - Courses</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-slate-50 min-h-screen">
    <!-- Navbar -->
    <nav class="bg-[#003366] text-white p-4 shadow-lg border-b-4 border-[#C5A059]">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 bg-white rounded-lg flex items-center justify-center text-[#003366] font-bold text-xl">A</div>
                <h1 class="text-xl font-bold">AUPP <span class="text-[#C5A059]">LMS</span></h1>
            </div>
            <div class="space-x-8 font-medium">
                <a href="index.html" class="hover:text-yellow-500 transition">Dashboard</a>
                <a href="courses.html" class="text-[#C5A059] border-b-2 border-[#C5A059] pb-1">Courses</a>
                <a href="grades.html" class="hover:text-yellow-500 transition">Grades</a>
            </div>
        </div>
    </nav>

    <!-- Content -->
    <main class="container mx-auto mt-12 px-6 max-w-5xl">
        <h2 class="text-3xl font-bold text-gray-800 mb-6">Course Catalog</h2>
        
        <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
            <table class="w-full text-left">
                <thead class="bg-gray-50 border-b">
                    <tr>
                        <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase tracking-wider">Code</th>
                        <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase tracking-wider">Course Name</th>
                        <th class="px-6 py-4 text-xs font-bold text-gray-400 uppercase tracking-wider">Instructor</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-gray-100">
                    <tr class="hover:bg-gray-50 transition">
                        <td class="px-6 py-4 font-bold text-[#003366]">CS101</td>
                        <td class="px-6 py-4 text-gray-700">Introduction to Computer Science</td>
                        <td class="px-6 py-4 text-gray-500">Dr. Sarah</td>
                    </tr>
                    <tr class="hover:bg-gray-50 transition">
                        <td class="px-6 py-4 font-bold text-[#003366]">DV202</td>
                        <td class="px-6 py-4 text-gray-700">DevOps & CI/CD Pipeline</td>
                        <td class="px-6 py-4 text-gray-500">Prof. Somnang</td>
                    </tr>
                    <tr class="hover:bg-gray-50 transition">
                        <td class="px-6 py-4 font-bold text-[#003366]">CC303</td>
                        <td class="px-6 py-4 text-gray-700">Cloud Architecture</td>
                        <td class="px-6 py-4 text-gray-500">Dr. Alan</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>
</body>
</html>
